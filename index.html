<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Summaries - Dominik Kaukinen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .hero {
            text-align: center;
            padding: 3rem 0;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .hero p {
            color: #555;
            font-size: 1.1rem;
        }

        .search {
            margin: 2rem 0;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .search input {
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            width: 100%;
            max-width: 500px;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .summary-card {
            background: #f8f9fa;
            padding: 2rem;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .summary-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.2);
        }

        .summary-card h3 {
            font-size: 1.4rem;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .summary-card .date {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .summary-card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tag {
            background: #667eea;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .summary-card .preview {
            color: #555;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #666;
        }

        .empty-state p {
            font-size: 1.2rem;
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 2px solid #e0e0e0;
            color: #666;
            font-size: 0.85rem;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .container {
                box-shadow: none;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>🔬 Research Summaries</h1>
            <p>Automated research tracking for AI alignment, interpretability, and emergent capabilities</p>
        </div>

        <div class="search">
            <input type="text" class="search" placeholder="🔍 Search summaries..." id="searchInput">
        </div>

        <div class="nav-grid" id="summaryGrid">
            <!-- Summaries will be injected here by GitHub Actions -->
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <p>No research summaries yet. Check back soon!</p>
        </div>

        <div class="footer">
            <p><strong>Generated by Design 🪄</strong> — OpenClaw AI Agent</p>
            <p>Last updated: <span id="lastUpdate"></span></p>
        </div>
    </div>

    <script>
        // Fetch summaries list from GitHub
        async function loadSummaries() {
            try {
                const response = await fetch('https://api.github.com/repos/YOUR_USERNAME/research-summary/contents/summaries/?ref=main');
                const data = await response.json();
                
                if (data.length === 0) {
                    document.getElementById('summaryGrid').style.display = 'none';
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                // Create summary cards
                const grid = document.getElementById('summaryGrid');
                grid.innerHTML = '';
                
                data.sort((a, b) => new Date(b.date) - new Date(a.date)).reverse()).forEach(summary => {
                    const card = document.createElement('div');
                    card.className = 'summary-card';
                    card.onclick = () => window.location.href = summary.url;
                    
                    const tagsHtml = summary.tags
                        ? summary.tags.map(tag => `<span class="tag">${tag}</span>`).join('')
                        : '';
                    
                    card.innerHTML = `
                        <h3>${summary.title}</h3>
                        <div class="date">${new Date(summary.date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
                        <div class="tags">${tagsHtml}</div>
                        <div class="preview">${summary.preview}</div>
                    `;
                    
                    grid.appendChild(card);
                });

                document.getElementById('lastUpdate').textContent = new Date().toLocaleString();

            } catch (error) {
                console.error('Failed to load summaries:', error);
                document.getElementById('summaryGrid').innerHTML = `
                    <div class="empty-state" style="display: block;">
                        <p>Error loading summaries. Please check back later.</p>
                    </div>
                `;
            }
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.summary-card');
            
            cards.forEach(card => {
                const title = card.querySelector('h3').textContent.toLowerCase();
                const preview = card.querySelector('.preview').textContent.toLowerCase();
                
                if (query === '' || title.includes(query) || preview.includes(query)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        });

        // Load summaries on page load
        loadSummaries();
    </script>
</body>
</html>
