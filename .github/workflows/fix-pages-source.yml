name: Fix GitHub Pages Source Path

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - 'summaries.json'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create pages directory
        run: mkdir -p pages

      - name: Move content to pages
        run: |
          # Move all files to pages directory
          mv index.html pages/
          mv summaries.json pages/
          mv 2026-04-04-research-summary.html pages/
          mv .github/ pages/.github/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Fix: Move content to pages/ subdirectory for GitHub Pages deployment" || true
          git push
