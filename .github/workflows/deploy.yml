name: Deploy Research Summaries

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'summaries.json'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Pages
        run: |
          # Create pages directory
          mkdir -p pages
          
          # Read summaries and generate index.html
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Research Summaries - Dominik Kaukinen</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                      line-height: 1.6; color: #1a1a2e;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh; padding: 2rem 1rem;
                  }
                  .container { max-width: 1200px; margin: 0 auto; background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
                  .hero { text-align: center; padding: 3rem 0; border-bottom: 2px solid #e0e0e0; margin-bottom: 2rem; }
                  .hero h1 { font-size: 3rem; color: #667eea; margin-bottom: 0.5rem; }
                  .hero p { color: #555; font-size: 1.1rem; }
                  .summaries-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
                  .summary-card { background: #f8f9fa; padding: 2rem; border-radius: 8px; border: 2px solid #e0e0e0; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
                  .summary-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(102,126,234,0.2); }
                  .summary-card h3 { font-size: 1.4rem; color: #333; margin-bottom: 0.75rem; }
                  .summary-card .date { color: #667eea; font-weight: 600; font-size: 0.9rem; margin-bottom: 1rem; }
                  .summary-card .preview { color: #555; font-size: 0.95rem; line-height: 1.4; }
                  .footer { text-align: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 2px solid #e0e0e0; color: #666; font-size: 0.85rem; }
                  @media print { body { background: white; padding: 0; } .container { box-shadow: none; padding: 1rem; }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="hero">
                      <h1>🔬 Research Summaries</h1>
                      <p>Automated research tracking for AI alignment, interpretability, and emergent capabilities</p>
                  </div>
                  
                  <div class="summaries-grid" id="summaryGrid">
                      <!-- Summaries will be added here -->
                  </div>
                  
                  <div class="footer">
                      <p><strong>Generated by Design 🪄</strong> — OpenClaw AI Agent</p>
                      <p>Last updated: <span id="lastUpdate"></span></p>
                  </div>
              </div>
              
              <script>
                  // Dynamic loading of summaries from API
                  document.addEventListener('DOMContentLoaded', async function() {
                      try {
                          const response = await fetch('https://api.github.com/repos/dominik-ai-bot/research-summary/contents/summaries.json?ref=main');
                          const data = await response.json();
                          
                          if (data.length === 0 || !Array.isArray(data)) {
                              document.getElementById('summaryGrid').innerHTML = '<div style="text-align:center; padding:4rem 2rem;"><p>No research summaries yet. Check back soon!</p></div>';
                              return;
                          }
                          
                          // Create summary cards
                          const grid = document.getElementById('summaryGrid');
                          grid.innerHTML = '';
                          
                          data.sort((a, b) => new Date(a.date) - new Date(b.date)).reverse().forEach(summary => {
                              const card = document.createElement('div');
                              card.className = 'summary-card';
                              card.style.cssText = 'cursor: pointer;';
                              card.onclick = () => window.location.href = summary.url;
                              
                              const tagsHtml = summary.tags
                                  ? summary.tags.map(tag => \`<span class="tag">\${tag}</span>\`).join('')
                                  : '';
                              
                              card.innerHTML = \`
                                  <h3>\${summary.title.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</h3>
                                  <div class="date">\${new Date(summary.date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
                                  <div class="tags">\${tagsHtml}</div>
                                  <div class="preview">\${summary.preview.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                              \`;
                              
                              grid.appendChild(card);
                          });

                          document.getElementById('lastUpdate').textContent = new Date().toLocaleString();

                      } catch (error) {
                          document.getElementById('summaryGrid').innerHTML = \`<div style="text-align:center; padding:4rem 2rem;"><p>Error loading summaries: \${error.message}</p></div>\`;
                      }
                  });
              </script>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions/github-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
